<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>SoulFlame AR Food</title>

  <script
    type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
  ></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .top-ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 14px;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .top-card {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 12px 16px;
      border-radius: 16px;
      text-align: center;
      max-width: 92%;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .top-card h1 {
      margin: 0 0 6px 0;
      font-size: 20px;
    }

    .top-card p {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      opacity: 0.95;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #101010 0%, #1c1c1c 100%);
      --poster-color: transparent;
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      text-align: center;
      max-width: 92%;
      line-height: 1.4;
      backdrop-filter: blur(8px);
    }

    .ar-note {
      color: #ffd166;
      font-weight: bold;
    }

    .fallback-note {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="top-ui">
    <div class="top-card">
      <h1>SoulFlame AR Food</h1>
      <p>
        Натисни <span class="ar-note">View in your space</span> / <span class="ar-note">AR</span>,
        насочи към масата и постави храната върху повърхността.
      </p>
      <div class="fallback-note">
        NFC само отваря страницата. AR режимът се стартира с бутон заради защитата на браузъра.
      </div>
    </div>
  </div>

  <model-viewer
    id="foodAR"
    src="ar/food2.glb"
    alt="AR food model"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    exposure="1"
    auto-rotate
    disable-zoom
    poster=""
    environment-image="neutral"
    placement="floor"
    scale="1 1 1"
  >
  </model-viewer>

  <div class="hint">
    След като страницата се отвори от NFC, натисни AR бутона и насочи телефона към маса или под.
  </div>

</body>
</html>
