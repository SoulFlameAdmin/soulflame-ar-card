<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>SoulFlame AR Floating Menu · Card AR + Table AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    :root {
      --orange: #ff7a18;
      --green: #57d600;
      --cyan: #00b8d9;
      --pink: #f72585;
      --blue: #1d7cff;
      --purple: #8b35ff;
      --white: #ffffff;
      --black: #050505;
      --shadow: 0 14px 28px rgba(0, 0, 0, .34);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: manipulation;
    }

    .hidden {
      display: none !important;
    }

    #scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .a-loader-title {
      display: none !important;
    }

    #fxCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      opacity: .22;
      mix-blend-mode: screen;
    }

    #topHud {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 10px 15px;
      border-radius: 999px;
      background: rgba(0,0,0,.58);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(15px);
      color: rgba(255,255,255,.92);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .15em;
      text-align: center;
      pointer-events: none;
      max-width: calc(100vw - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #bottomStatus {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.62);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.82);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      backdrop-filter: blur(11px);
      pointer-events: none;
      max-width: 70vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #scanFrame {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 15;
      width: min(68vw, 340px);
      aspect-ratio: .56;
      transform: translate(-50%, -50%);
      border-radius: 30px;
      pointer-events: none;
      opacity: .72;
      transition: opacity .25s ease, transform .25s ease;
    }

    #scanFrame.locked {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.92);
    }

    #scanFrame::before,
    #scanFrame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    #scanFrame::before {
      border: 1px solid rgba(255,255,255,.26);
      box-shadow:
        0 0 54px rgba(255,255,255,.11),
        inset 0 0 42px rgba(255,255,255,.06);
    }

    #scanFrame::after {
      background:
        linear-gradient(#fff,#fff) left top / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) left top / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) right top / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) right top / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) left bottom / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) left bottom / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) right bottom / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) right bottom / 2px 46px no-repeat;
      filter: drop-shadow(0 0 11px rgba(255,255,255,.70));
      animation: framePulse 1.35s ease-in-out infinite alternate;
    }

    #scanLine {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 10%;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      box-shadow: 0 0 18px rgba(255,255,255,.85);
      animation: scanLineMove 2.1s ease-in-out infinite alternate;
    }

    @keyframes framePulse {
      from { opacity: .45; transform: scale(.99); }
      to { opacity: 1; transform: scale(1.01); }
    }

    @keyframes scanLineMove {
      from { transform: translateY(0); opacity: .25; }
      to { transform: translateY(342px); opacity: .9; }
    }

    #debugBox {
      position: fixed;
      left: 12px;
      top: 54px;
      z-index: 50;
      width: min(460px, calc(100vw - 24px));
      padding: 10px 12px;
      border: 1px solid rgba(255,80,80,.35);
      border-radius: 16px;
      background: rgba(0,0,0,.78);
      color: rgba(255,255,255,.86);
      font-size: 11px;
      line-height: 1.38;
      display: none;
      white-space: pre-wrap;
      pointer-events: none;
    }

    #debugBox.active {
      display: block;
    }

    .hud {
      position: fixed;
      inset: 0;
      z-index: 12;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 22px;
      perspective: 1200px;
      opacity: 0;
      transform: scale(.96);
      transition: opacity .28s ease, transform .28s ease;
    }

    .hud.active {
      opacity: 1;
      transform: scale(1);
    }

    .floating-menu {
      position: relative;
      width: min(1160px, 96vw);
      height: min(900px, 94vh);
      transform-style: preserve-3d;
      animation: softFloat 5.8s ease-in-out infinite;
      filter: drop-shadow(0 20px 30px rgba(0,0,0,.24));
      pointer-events: auto;
    }

    @keyframes softFloat {
      0%, 100% {
        transform: translateY(0) rotateX(0deg) rotateY(0deg);
      }

      50% {
        transform: translateY(-8px) rotateX(.6deg) rotateY(-.6deg);
      }
    }

    .top {
      position: absolute;
      left: 62px;
      right: 36px;
      top: 12px;
      height: 154px;
      display: grid;
      grid-template-columns: 160px 1fr;
      align-items: center;
      gap: 28px;
    }

    .logo-orb {
      width: 136px;
      height: 136px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      position: relative;
      background: rgba(255,255,255,.96);
      box-shadow:
        0 12px 28px rgba(0,0,0,.26),
        0 0 0 5px rgba(255,255,255,.58);
    }

    .logo-orb::before {
      content: "";
      position: absolute;
      inset: -8px;
      border-radius: inherit;
      padding: 5px;
      background: linear-gradient(135deg, #1d7cff, #6a4dff, #8b35ff, #f72585);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      z-index: 2;
      pointer-events: none;
    }

    .real-logo {
      width: 82%;
      height: 82%;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
      filter: contrast(1.18) brightness(.88);
    }

    .title {
      transform: translateZ(42px);
    }

    .title h1 {
      margin: 0;
      font-size: clamp(48px, 7vw, 84px);
      line-height: .9;
      font-weight: 900;
      letter-spacing: -3px;
      background: linear-gradient(90deg, #1d7cff, #386cff, #773cff, #a020ff);
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-stroke: .7px rgba(255,255,255,.35);
      text-shadow:
        0 3px 8px rgba(0,0,0,.34),
        0 0 8px rgba(255,255,255,.14);
    }

    .title p {
      margin: 10px 0 0;
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 800;
      color: #fff;
      text-shadow: 0 3px 6px rgba(0,0,0,.76);
    }

    .rows {
      position: absolute;
      left: 16px;
      right: 8px;
      top: 190px;
      bottom: 24px;
      display: grid;
      grid-template-rows: repeat(4, 1fr);
      gap: 18px;
    }

    .row {
      position: relative;
      display: grid;
      grid-template-columns: 292px 318px minmax(330px, 1fr) 62px;
      gap: 22px;
      align-items: center;
      transform-style: preserve-3d;
      cursor: pointer;
    }

    .row:nth-child(1) { transform: translateZ(70px); }
    .row:nth-child(2) { transform: translateZ(54px); }
    .row:nth-child(3) { transform: translateZ(38px); }
    .row:nth-child(4) { transform: translateZ(22px); }

    .option {
      height: 132px;
      border-radius: 36px;
      display: flex;
      align-items: center;
      padding: 18px 30px;
      position: relative;
      overflow: hidden;
      color: white;
      font-weight: 900;
      box-shadow: var(--shadow);
    }

    .option::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.27), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.16));
      z-index: 1;
      pointer-events: none;
    }

    .option::after {
      content: "";
      position: absolute;
      right: -28px;
      top: 50%;
      width: 78px;
      height: 78px;
      border-radius: 22px;
      transform: translateY(-50%) rotate(45deg);
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.24);
      z-index: 0;
    }

    .option-content {
      position: relative;
      z-index: 3;
    }

    .num {
      display: block;
      font-size: 72px;
      line-height: .78;
      letter-spacing: -4px;
      text-shadow: 0 3px 6px rgba(0,0,0,.34);
    }

    .opt {
      display: block;
      margin-top: 8px;
      font-size: 31px;
      line-height: 1;
      text-shadow: 0 2px 5px rgba(0,0,0,.35);
    }

    .label {
      height: 112px;
      display: flex;
      align-items: center;
      gap: 18px;
      color: white;
      font-size: 40px;
      font-weight: 900;
      text-shadow:
        0 3px 5px rgba(0,0,0,.78),
        0 0 5px rgba(255,255,255,.12);
    }

    .icon {
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      font-size: 50px;
      line-height: 1;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,.55));
    }

    .text-wrap {
      position: relative;
      display: inline-block;
      white-space: nowrap;
    }

    .dots {
      position: absolute;
      left: 0;
      bottom: -27px;
      display: flex;
      gap: 13px;
    }

    .dot {
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 3px 5px rgba(0,0,0,.25);
    }

    .dot:nth-child(4) { opacity: .55; }
    .dot:nth-child(5) { opacity: .32; }

    .product {
      height: 132px;
      border-radius: 36px;
      position: relative;
      overflow: hidden;
      background: rgba(0,0,0,.26);
      border: 3px solid currentColor;
      box-shadow: var(--shadow);
    }

    .product img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.08) saturate(1.22) brightness(1.03);
    }

    .product::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(90deg, rgba(0,0,0,.20), transparent 48%, rgba(0,0,0,.34)),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.10));
      pointer-events: none;
    }

    .product::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,.24);
      z-index: 3;
      pointer-events: none;
    }

    .badge3d {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 4;
      width: 58px;
      height: 48px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.42);
      border: 2px solid currentColor;
      color: white;
      font-size: 23px;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,.55);
      box-shadow: 0 8px 18px rgba(0,0,0,.24);
    }

    .arrow {
      width: 56px;
      height: 76px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: currentColor;
      color: white;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .arrow::before {
      content: "›";
      font-size: 64px;
      font-weight: 300;
      line-height: 1;
      color: white;
      transform: translateY(-3px);
      text-shadow: 0 2px 4px rgba(0,0,0,.3);
    }

    .orange { color: var(--orange); }
    .green { color: var(--green); }
    .cyan { color: var(--cyan); }
    .pink { color: var(--pink); }

    .bg-orange {
      background: linear-gradient(135deg, #ff4d00, #ff7a18 50%, #ffb000);
    }

    .bg-green {
      background: linear-gradient(135deg, #239d00, #57d600 50%, #94ef00);
    }

    .bg-cyan {
      background: linear-gradient(135deg, #007a95, #00b8d9 50%, #00e0ff);
    }

    .bg-pink {
      background: linear-gradient(135deg, #c90057, #f72585 50%, #ff5daf);
    }

    @media (max-width: 920px) {
      .hud {
        padding: 8px;
        align-items: flex-start;
      }

      .floating-menu {
        width: 100vw;
        height: 100vh;
      }

      .top {
        left: 16px;
        right: 12px;
        top: 18px;
        height: 108px;
        grid-template-columns: 92px 1fr;
        gap: 14px;
      }

      .logo-orb {
        width: 78px;
        height: 78px;
      }

      .logo-orb::before {
        inset: -7px;
        padding: 4px;
      }

      .real-logo {
        width: 82%;
        height: 82%;
      }

      .title h1 {
        font-size: 41px;
        letter-spacing: -2px;
      }

      .title p {
        font-size: 18px;
        margin-top: 5px;
      }

      .rows {
        left: 8px;
        right: 6px;
        top: 150px;
        bottom: 22px;
        gap: 12px;
      }

      .row {
        grid-template-columns: 104px 1fr 150px 30px;
        gap: 7px;
      }

      .option {
        height: 84px;
        padding: 10px 13px;
        border-radius: 24px;
      }

      .option::after {
        width: 44px;
        height: 44px;
        right: -19px;
        border-radius: 14px;
      }

      .num {
        font-size: 39px;
        letter-spacing: -2px;
      }

      .opt {
        font-size: 16px;
        margin-top: 5px;
      }

      .label {
        height: 84px;
        gap: 8px;
        font-size: 22px;
      }

      .icon {
        width: 34px;
        height: 34px;
        font-size: 30px;
      }

      .dots {
        bottom: -16px;
        gap: 6px;
      }

      .dot {
        width: 8px;
        height: 8px;
      }

      .product {
        height: 82px;
        border-radius: 22px;
        border-width: 2px;
      }

      .product::after {
        inset: 2px;
        border-radius: 18px;
      }

      .badge3d {
        width: 38px;
        height: 32px;
        top: 8px;
        right: 8px;
        font-size: 14px;
        border-radius: 12px;
      }

      .arrow {
        width: 30px;
        height: 54px;
        border-radius: 16px;
      }

      .arrow::before {
        font-size: 42px;
      }

      #topHud {
        font-size: 10px;
      }

      #bottomStatus {
        font-size: 9px;
      }

      #scanFrame {
        width: min(72vw, 315px);
      }
    }

    @media (max-width: 420px) {
      .row {
        grid-template-columns: 96px 1fr 128px 24px;
      }

      .label {
        font-size: 20px;
      }

      .product {
        height: 78px;
      }

      .title h1 {
        font-size: 36px;
      }

      .title p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <canvas id="fxCanvas"></canvas>
  <div id="debugBox"></div>

  <div id="topHud">ДОКОСНИ ЕКРАНА · SCAN SOULFLAME CARD</div>

  <div id="scanFrame">
    <div id="scanLine"></div>
  </div>

  <div id="bottomStatus">READY</div>

  <div class="hud" id="floatingHud">
    <main class="floating-menu">
      <header class="top">
        <div class="logo-orb">
          <img
            class="real-logo"
            src="./soulflame-logo.png"
            alt="SoulFlame Logo"
            onerror="this.onerror=null; this.src='./ChatGPT Image 2.05.2026 г., 19_55_36.png';"
          />
        </div>

        <div class="title">
          <h1>SoulFlame AR</h1>
          <p>Interactive 3D Experiences</p>
        </div>
      </header>

      <section class="rows">
        <article class="row orange" data-action="table">
          <div class="option bg-orange">
            <div class="option-content">
              <span class="num">01</span>
              <span class="opt">опция</span>
            </div>
          </div>

          <div class="label">
            <div class="icon">🍴</div>
            <div class="text-wrap">
              Ресторанти
              <div class="dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div>
            </div>
          </div>

          <div class="product">
            <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=85" alt="Ресторанти AR">
            <div class="badge3d">3D</div>
          </div>

          <div class="arrow"></div>
        </article>

        <article class="row green" data-action="clothes">
          <div class="option bg-green">
            <div class="option-content">
              <span class="num">02</span>
              <span class="opt">опция</span>
            </div>
          </div>

          <div class="label">
            <div class="icon">👕</div>
            <div class="text-wrap">
              Дрехи
              <div class="dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div>
            </div>
          </div>

          <div class="product">
            <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=900&q=85" alt="Дрехи AR">
            <div class="badge3d">3D</div>
          </div>

          <div class="arrow"></div>
        </article>

        <article class="row cyan" data-action="furniture">
          <div class="option bg-cyan">
            <div class="option-content">
              <span class="num">03</span>
              <span class="opt">опция</span>
            </div>
          </div>

          <div class="label">
            <div class="icon">🛋</div>
            <div class="text-wrap">
              Мебели
              <div class="dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div>
            </div>
          </div>

          <div class="product">
            <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?auto=format&fit=crop&w=900&q=85" alt="Мебели AR">
            <div class="badge3d">3D</div>
          </div>

          <div class="arrow"></div>
        </article>

        <article class="row pink" data-action="cars">
          <div class="option bg-pink">
            <div class="option-content">
              <span class="num">04</span>
              <span class="opt">опция</span>
            </div>
          </div>

          <div class="label">
            <div class="icon">🚗</div>
            <div class="text-wrap">
              Коли
              <div class="dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
              </div>
            </div>
          </div>

          <div class="product">
            <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=900&q=85" alt="Коли AR">
            <div class="badge3d">3D</div>
          </div>

          <div class="arrow"></div>
        </article>
      </section>
    </main>
  </div>

  <a-scene
    id="scene"
    mindar-image="
      imageTargetSrc: ./targets/soulflame-black.mind;
      autoStart: false;
      uiScanning: no;
      uiLoading: no;
      warmupTolerance: 5;
      missTolerance: 80;
      filterMinCF: 0.00004;
      filterBeta: 0.0006;
    "
    color-space="sRGB"
    renderer="
      colorManagement: true;
      physicallyCorrectLights: false;
      antialias: true;
      alpha: true;
      precision: high;
      logarithmicDepthBuffer: true;
      powerPreference: high-performance;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets timeout="60000">
      <a-asset-item id="pizzaGLB" src="./uploads_files_6479452_187.glb"></a-asset-item>
    </a-assets>

    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      camera="near: 0.001; far: 100000"
    ></a-camera>

    <a-light type="ambient" intensity="0.75" color="#ffffff"></a-light>
    <a-light type="directional" intensity="1.1" color="#ffffff" position="0 2 1"></a-light>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-entity id="stableWorld" position="0 0 0">
        <a-circle
          id="arTable"
          position="0 -0.09 0.052"
          radius="0.58"
          color="#ffffff"
          opacity="0.10"
          material="transparent: true; depthWrite: false; side: double"
          animation="property: opacity; from: 0.055; to: 0.15; dur: 1600; dir: alternate; loop: true; easing: easeInOutSine"
        ></a-circle>

        <a-ring
          id="tableRing"
          position="0 -0.09 0.064"
          radius-inner="0.49"
          radius-outer="0.505"
          color="#ffffff"
          opacity="0.58"
          material="transparent: true; depthWrite: false"
          animation="property: rotation; to: 0 0 360; dur: 16000; loop: true; easing: linear"
        ></a-ring>

        <a-text
          id="arSizeText"
          value="SOULFLAME AR"
          position="-0.31 -0.73 0.083"
          width="1"
          align="center"
          color="#ffb347"
          opacity="0.98"
          material="transparent: true; depthWrite: false"
        ></a-text>

        <a-entity
          id="pizzaRig"
          visible="false"
          position="0 -0.09 0.17"
          rotation="90 0 0"
          scale="1 1 1"
        >
          <a-entity
            id="pizzaModel"
            gltf-model="#pizzaGLB"
            position="0 0 0"
            rotation="0 0 0"
            scale="1 1 1"
          ></a-entity>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const CONFIG = {
      tableARUrl: "./table-ar.html",
      siteUrl: "https://soulflame-ar-card.vercel.app",
      targetFile: "./targets/soulflame-black.mind",
      glbFile: "./uploads_files_6479452_187.glb",
      giantPizzaWidth: 3.33,
      autoShowPizzaOnFirstScan: true,
      keepMenuAfterLost: true
    };

    const scene = document.getElementById("scene");
    const target = document.getElementById("target");
    const floatingHud = document.getElementById("floatingHud");
    const topHud = document.getElementById("topHud");
    const bottomStatus = document.getElementById("bottomStatus");
    const scanFrame = document.getElementById("scanFrame");
    const debugBox = document.getElementById("debugBox");
    const pizzaRig = document.getElementById("pizzaRig");
    const pizzaModel = document.getElementById("pizzaModel");

    const fxCanvas = document.getElementById("fxCanvas");
    const fxCtx = fxCanvas.getContext("2d");

    let arSystem = null;
    let started = false;
    let visible = false;
    let lockedOnce = false;
    let cameraTrack = null;
    let modelReady = false;
    let startAttempted = false;

    function setStatus(top, bottom = "") {
      topHud.textContent = top;
      bottomStatus.textContent = bottom;
    }

    function hideStatusSoon() {
      clearTimeout(window.__statusTimer);
      window.__statusTimer = setTimeout(() => {
        topHud.classList.add("hidden");
        bottomStatus.classList.add("hidden");
      }, 4200);
    }

    function showStatus() {
      topHud.classList.remove("hidden");
      bottomStatus.classList.remove("hidden");
    }

    function showDebug(message) {
      debugBox.classList.add("active");
      debugBox.textContent = message;
      console.warn(message);
    }

    function hideDebug() {
      debugBox.classList.remove("active");
    }

    function haptic(ms = 35) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function showFloatingMenu() {
      floatingHud.classList.add("active");
      scanFrame.classList.add("locked");
    }

    function hideFloatingMenu() {
      floatingHud.classList.remove("active");
      scanFrame.classList.remove("locked");
    }

    async function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function getCameraTrackFromMindAR() {
      for (let i = 0; i < 20; i++) {
        const videos = Array.from(document.querySelectorAll("video"));

        for (const video of videos) {
          const stream = video.srcObject;

          if (stream && typeof stream.getVideoTracks === "function") {
            const track = stream.getVideoTracks()[0];

            if (track && track.readyState === "live") {
              cameraTrack = track;
              return track;
            }
          }
        }

        await sleep(150);
      }

      return null;
    }

    async function enableCameraAutoFocus() {
      try {
        const track = cameraTrack || await getCameraTrackFromMindAR();

        if (!track || !track.getCapabilities || !track.applyConstraints) return false;

        const capabilities = track.getCapabilities();

        if (capabilities.focusMode && capabilities.focusMode.includes("continuous")) {
          await track.applyConstraints({
            advanced: [{ focusMode: "continuous" }]
          });

          return true;
        }

        if (capabilities.focusMode && capabilities.focusMode.includes("single-shot")) {
          await track.applyConstraints({
            advanced: [{ focusMode: "single-shot" }]
          });

          return true;
        }

        return false;
      } catch (error) {
        console.warn("AUTOFOCUS ERROR:", error);
        return false;
      }
    }

    async function startAR() {
      try {
        if (started || startAttempted) return;

        startAttempted = true;
        showStatus();
        setStatus("STARTING AR CAMERA", "ALLOW CAMERA");

        if (location.protocol === "file:") {
          startAttempted = false;
          setStatus("НЕ СТАРТИРАЙ ПРЕЗ FILE", "ПУСНИ LOCALHOST ИЛИ VERCEL");
          showDebug("Камерата и MindAR искат HTTPS или localhost. Не отваряй index.html с двоен клик.");
          return;
        }

        if (!arSystem) {
          await new Promise((resolve) => {
            if (scene.hasLoaded) resolve();
            else scene.addEventListener("loaded", resolve, { once: true });
          });

          arSystem = scene.systems["mindar-image-system"];
        }

        if (!arSystem) throw new Error("MindAR system not found");

        await arSystem.start();

        started = true;
        startAttempted = false;

        await sleep(650);
        await enableCameraAutoFocus();

        setStatus("SCAN SOULFLAME CARD", "ДРЪЖ ТЕЛЕФОНА СТАБИЛНО");
      } catch (error) {
        startAttempted = false;
        started = false;
        setStatus("AR CAMERA ERROR", "ДОКОСНИ ПАК ЕКРАНА");
        showDebug(error.message || String(error));
      }
    }

    scene.addEventListener("loaded", () => {
      arSystem = scene.systems["mindar-image-system"];

      if (scene.renderer && window.THREE) {
        if (THREE.SRGBColorSpace) scene.renderer.outputColorSpace = THREE.SRGBColorSpace;
        scene.renderer.toneMappingExposure = 1.0;
        scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.35));
      }

      setStatus("AR SYSTEM READY", "ДОКОСНИ ЕКРАНА");
    });

    target.addEventListener("targetFound", async () => {
      visible = true;
      lockedOnce = true;

      hideDebug();
      showFloatingMenu();

      if (CONFIG.autoShowPizzaOnFirstScan) {
        pizzaRig.setAttribute("visible", "true");
      }

      await enableCameraAutoFocus();

      setStatus("SOULFLAME AR LOCKED", "MENU FLOATING IN AIR");
      hideStatusSoon();
      haptic(38);
    });

    target.addEventListener("targetLost", () => {
      visible = false;

      if (CONFIG.keepMenuAfterLost && lockedOnce) {
        showFloatingMenu();
        setStatus("SOULFLAME MENU LOCKED", "CARD NOT NEEDED");
        hideStatusSoon();
        return;
      }

      hideFloatingMenu();
      setStatus("TARGET LOST", "SHOW CARD TO CAMERA");
    });

    pizzaModel.addEventListener("model-loaded", () => {
      try {
        const model = pizzaModel.getObject3D("mesh");

        if (!model || !window.THREE) {
          modelReady = true;
          return;
        }

        model.traverse((node) => {
          if (!node.isMesh) return;

          node.frustumCulled = false;

          const materials = Array.isArray(node.material) ? node.material : [node.material];

          materials.forEach((mat) => {
            if (!mat) return;

            mat.side = THREE.DoubleSide;

            if (mat.map && THREE.SRGBColorSpace) {
              mat.map.colorSpace = THREE.SRGBColorSpace;
              mat.map.needsUpdate = true;
            }

            mat.needsUpdate = true;
          });
        });

        model.updateMatrixWorld(true);

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();

        box.getSize(size);
        box.getCenter(center);

        const maxSize = Math.max(size.x, size.y, size.z);

        if (Number.isFinite(maxSize) && maxSize > 0) {
          model.position.x -= center.x;
          model.position.y -= center.y;
          model.position.z -= center.z;

          const scale = CONFIG.giantPizzaWidth / maxSize;
          model.scale.setScalar(scale);
          model.updateMatrixWorld(true);
        }

        modelReady = true;
        setStatus("PIZZA GLB READY", "SCAN CARD");
      } catch (error) {
        showDebug("GLB AUTO-FIT ERROR: " + error.message);
      }
    });

    pizzaModel.addEventListener("model-error", () => {
      showDebug(
        "GLB ERROR: Не се зареди файлът.\n" +
        "Провери дали този файл съществува:\n" +
        CONFIG.glbFile
      );
    });

    document.querySelectorAll(".row").forEach((row) => {
      row.addEventListener("click", () => {
        const action = row.dataset.action;

        haptic(25);

        if (action === "table") {
          window.location.href = CONFIG.tableARUrl;
          return;
        }

        if (action === "clothes") {
          setStatus("AR ДРЕХИ", "COMING NEXT");
          showStatus();
          hideStatusSoon();
          return;
        }

        if (action === "furniture") {
          setStatus("AR МЕБЕЛИ", "COMING NEXT");
          showStatus();
          hideStatusSoon();
          return;
        }

        if (action === "cars") {
          setStatus("AR КОЛИ", "COMING NEXT");
          showStatus();
          hideStatusSoon();
        }
      });
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        startAR();
      }, 450);
    });

    document.body.addEventListener("click", () => {
      startAR();
    });

    document.body.addEventListener("touchstart", () => {
      startAR();
    }, { passive: true });

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden && arSystem && started) {
        try {
          await arSystem.stop();

          started = false;
          startAttempted = false;
          visible = false;
          cameraTrack = null;

          hideFloatingMenu();
          scanFrame.classList.remove("locked");
          showStatus();
          setStatus("AR PAUSED", "ДОКОСНИ ЗА СТАРТ");
        } catch (error) {
          console.warn(error);
        }
      }
    });

    const particles = [];
    const PARTICLE_COUNT = 34;

    function resizeFx() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.4);
      fxCanvas.width = Math.floor(window.innerWidth * dpr);
      fxCanvas.height = Math.floor(window.innerHeight * dpr);
      fxCanvas.style.width = window.innerWidth + "px";
      fxCanvas.style.height = window.innerHeight + "px";
      fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function createParticles() {
      particles.length = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.5 + .35,
          vx: (Math.random() - .5) * .16,
          vy: (Math.random() - .5) * .16,
          a: Math.random() * .34 + .08
        });
      }
    }

    function drawParticles() {
      fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = window.innerWidth;
        if (p.x > window.innerWidth) p.x = 0;
        if (p.y < 0) p.y = window.innerHeight;
        if (p.y > window.innerHeight) p.y = 0;

        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fxCtx.fillStyle = `rgba(255,255,255,${p.a})`;
        fxCtx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener("resize", () => {
      resizeFx();
      createParticles();

      if (scene.renderer) {
        scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.35));
      }
    });

    window.addEventListener("error", (event) => {
      showDebug("JS ERROR: " + event.message);
    });

    window.addEventListener("unhandledrejection", (event) => {
      showDebug("PROMISE ERROR: " + (event.reason?.message || event.reason));
    });

    resizeFx();
    createParticles();
    drawParticles();
  </script>
</body>
</html>
