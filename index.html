<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#030303" />
  <title>SoulFlame AR Card</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #030303;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .hidden {
      display: none !important;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.12), rgba(0,0,0,.96) 62%),
        linear-gradient(135deg, rgba(255,255,255,.06), transparent);
    }

    .start-card {
      width: min(440px, 92vw);
      padding: 32px 24px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: 30px;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(20px);
      text-align: center;
      box-shadow:
        0 0 80px rgba(255,255,255,.16),
        inset 0 0 28px rgba(255,255,255,.05);
    }

    .logo-mark {
      width: 62px;
      height: 62px;
      margin: 0 auto;
      position: relative;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(255,255,255,.95);
      box-shadow:
        0 0 10px rgba(255,255,255,.65),
        inset 0 0 10px rgba(255,255,255,.12);
    }

    .logo-mark::before {
      inset: 8px;
      transform: rotate(30deg) skew(-8deg);
    }

    .logo-mark::after {
      inset: 17px 4px 4px 28px;
      transform: rotate(-28deg) skew(10deg);
    }

    .start-card h1 {
      margin: 18px 0 10px;
      letter-spacing: .24em;
      font-size: 25px;
    }

    .start-card p {
      margin: 0 auto 22px;
      max-width: 340px;
      color: rgba(255,255,255,.82);
      line-height: 1.45;
    }

    #startBtn {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      min-width: 220px;
      background: #fff;
      color: #000;
      font-weight: 900;
      letter-spacing: .14em;
      cursor: pointer;
      box-shadow: 0 0 28px rgba(255,255,255,.42);
    }

    .hint {
      display: block;
      margin-top: 16px;
      color: rgba(255,255,255,.52);
      font-size: 12px;
    }

    #topHud {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      letter-spacing: .16em;
      text-align: center;
      pointer-events: none;
    }

    #bottomStatus {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 9998;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(0,0,0,.58);
      border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.80);
      font-size: 11px;
      letter-spacing: .12em;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    #actionDock {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 9999;
      display: none;
      gap: 10px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(0,0,0,.52);
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(12px);
    }

    #actionDock.active {
      display: flex;
    }

    #actionDock button {
      border: 0;
      border-radius: 999px;
      padding: 11px 13px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .11em;
      background: rgba(255,255,255,.94);
      color: #000;
      box-shadow: 0 0 18px rgba(255,255,255,.20);
      cursor: pointer;
      white-space: nowrap;
    }

    #actionDock button:nth-child(2) {
      background: rgba(0,0,0,.78);
      color: #fff;
      border: 1px solid rgba(255,255,255,.38);
    }

    .a-loader-title {
      display: none !important;
    }
  </style>
</head>

<body>
  <section id="startScreen">
    <div class="start-card">
      <div class="logo-mark"></div>
      <h1>SOULFLAME AR</h1>
      <p>
        Насочи камерата към <b>черната страна</b> на визитката.
        AR ще се появи само когато бъде разпозната реалната SoulFlame карта.
      </p>
      <button id="startBtn">START AR</button>
      <span class="hint">Работи през HTTPS / Vercel. Не през file:///</span>
    </div>
  </section>

  <div id="topHud">SCAN SOULFLAME CARD</div>
  <div id="bottomStatus">READY</div>

  <div id="actionDock">
    <button id="openSite">OPEN WEBSITE</button>
    <button id="contactMail">CONTACT</button>
  </div>

  <a-scene
    id="scene"
    mindar-image="
      imageTargetSrc: ./targets/soulflame-black.mind;
      autoStart: false;
      uiScanning: yes;
      uiLoading: no;
      filterMinCF: 0.001;
      filterBeta: 0.01;
    "
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-assets>
      <canvas id="holoTexture" width="1024" height="1024"></canvas>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">

      <a-plane
        position="0 0 0.006"
        width="1.02"
        height="1.78"
        color="#ffffff"
        opacity="0.10"
        material="transparent: true; depthWrite: false"
      ></a-plane>

      <a-plane
        position="0 0 0.012"
        width="1.08"
        height="1.86"
        color="#ffffff"
        opacity="0.055"
        material="transparent: true; depthWrite: false; side: double"
        animation="property: opacity; from: 0.035; to: 0.10; dur: 1200; dir: alternate; loop: true; easing: easeInOutSine"
      ></a-plane>

      <a-ring
        position="0 0.62 0.035"
        radius-inner="0.17"
        radius-outer="0.185"
        color="#ffffff"
        opacity="0.84"
        material="transparent: true; depthWrite: false"
        animation="property: rotation; to: 0 0 360; dur: 9000; loop: true; easing: linear"
      ></a-ring>

      <a-ring
        position="0 0.62 0.04"
        radius-inner="0.235"
        radius-outer="0.242"
        color="#ffffff"
        opacity="0.40"
        material="transparent: true; depthWrite: false"
        animation="property: rotation; to: 0 0 -360; dur: 12000; loop: true; easing: linear"
      ></a-ring>

      <a-text
        value="SOULFLAME"
        position="-0.29 0.39 0.05"
        width="1.2"
        align="center"
        color="#ffffff"
        opacity="0.96"
        material="transparent: true; depthWrite: false"
        animation="property: position; from: -0.29 0.39 0.05; to: -0.29 0.43 0.05; dur: 1800; dir: alternate; loop: true; easing: easeInOutSine"
      ></a-text>

      <a-text
        value="AR / NFC / AI SYSTEMS"
        position="-0.33 0.28 0.05"
        width="0.95"
        align="center"
        color="#ffffff"
        opacity="0.78"
        material="transparent: true; depthWrite: false"
      ></a-text>

      <a-entity position="0.72 0.22 0.07">
        <a-plane
          width="0.92"
          height="0.46"
          color="#ffffff"
          opacity="0.16"
          material="transparent: true; depthWrite: false"
        ></a-plane>

        <a-text
          value="PORTFOLIO"
          position="-0.39 0.16 0.025"
          width="0.92"
          color="#ffffff"
          opacity="0.92"
          align="left"
          material="transparent: true; depthWrite: false"
        ></a-text>

        <a-plane
          position="-0.22 -0.06 0.03"
          width="0.32"
          height="0.22"
          color="#ffffff"
          opacity="0.30"
          material="transparent: true; depthWrite: false"
        ></a-plane>

        <a-text
          value="AR"
          position="-0.31 -0.10 0.05"
          width="0.8"
          color="#ffffff"
          align="center"
          material="transparent: true; depthWrite: false"
        ></a-text>

        <a-plane
          position="0.22 -0.06 0.03"
          width="0.32"
          height="0.22"
          color="#111111"
          opacity="0.70"
          material="transparent: true; depthWrite: false"
        ></a-plane>

        <a-text
          value="NFC"
          position="0.11 -0.10 0.05"
          width="0.8"
          color="#ffffff"
          align="center"
          material="transparent: true; depthWrite: false"
        ></a-text>
      </a-entity>

      <a-entity position="0.72 -0.30 0.07">
        <a-plane
          width="0.92"
          height="0.56"
          color="#ffffff"
          opacity="0.15"
          material="transparent: true; depthWrite: false"
        ></a-plane>

        <a-plane
          position="0 0.20 0.025"
          width="0.80"
          height="0.13"
          color="#ffffff"
          opacity="0.90"
          material="transparent: true; depthWrite: false"
        ></a-plane>

        <a-text
          value="SERVICES"
          position="-0.32 0.16 0.05"
          width="0.8"
          color="#000000"
          align="left"
          material="transparent: true; depthWrite: false"
        ></a-text>

        <a-text
          value="AR VIZITKI\nNFC + AR USLUGI\nSAITOVE I AI SISTEMI"
          position="-0.36 0.03 0.05"
          width="0.78"
          color="#ffffff"
          align="left"
          opacity="0.96"
          material="transparent: true; depthWrite: false"
        ></a-text>
      </a-entity>

      <a-entity position="-0.08 -0.96 0.07">
        <a-sphere
          position="-0.36 0.18 0"
          radius="0.025"
          color="#ffffff"
          opacity="0.92"
          material="transparent: true; depthWrite: false"
        ></a-sphere>

        <a-cylinder
          position="-0.36 0.03 0"
          radius="0.004"
          height="0.24"
          color="#ffffff"
          opacity="0.80"
          material="transparent: true; depthWrite: false"
        ></a-cylinder>

        <a-text
          value="ABOUT US"
          position="-0.30 0.06 0.04"
          width="1.0"
          color="#ffffff"
          align="left"
          material="transparent: true; depthWrite: false"
        ></a-text>

        <a-text
          value="INTERACTIVE AR/NFC BUSINESS CARDS,\nWEBSITES AND AI SYSTEMS FOR BRANDS\nTHAT WANT TO LOOK LIKE THE FUTURE."
          position="-0.30 -0.09 0.04"
          width="0.72"
          color="#ffffff"
          opacity="0.88"
          align="left"
          material="transparent: true; depthWrite: false"
        ></a-text>
      </a-entity>

      <a-entity position="0 0 0.09">
        <a-sphere position="-0.38 0.62 0" radius="0.012" color="#ffffff" opacity="0.85"></a-sphere>
        <a-sphere position="0.38 0.54 0" radius="0.009" color="#ffffff" opacity="0.60"></a-sphere>
        <a-sphere position="-0.32 -0.12 0" radius="0.008" color="#ffffff" opacity="0.60"></a-sphere>
        <a-sphere position="0.28 -0.58 0" radius="0.010" color="#ffffff" opacity="0.74"></a-sphere>
        <a-sphere position="0.06 -0.74 0" radius="0.006" color="#ffffff" opacity="0.54"></a-sphere>
      </a-entity>

      <a-entity position="0 0 0.08">
        <a-cylinder
          position="0.42 -0.55 0"
          radius="0.003"
          height="0.62"
          rotation="0 0 -28"
          color="#ffffff"
          opacity="0.68"
          material="transparent: true; depthWrite: false"
        ></a-cylinder>

        <a-cylinder
          position="-0.18 -0.58 0"
          radius="0.002"
          height="0.44"
          rotation="0 0 17"
          color="#ffffff"
          opacity="0.46"
          material="transparent: true; depthWrite: false"
        ></a-cylinder>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const topHud = document.getElementById("topHud");
    const bottomStatus = document.getElementById("bottomStatus");
    const actionDock = document.getElementById("actionDock");
    const openSite = document.getElementById("openSite");
    const contactMail = document.getElementById("contactMail");
    const scene = document.querySelector("a-scene");
    const target = document.getElementById("target");

    const SITE_URL = "https://soulflameAR.vercel.app";
    const EMAIL = "soulflame.mitko@gmail.com";

    let arSystem = null;
    let started = false;
    let visible = false;

    openSite.addEventListener("click", () => {
      window.open(SITE_URL, "_blank");
    });

    contactMail.addEventListener("click", () => {
      window.location.href = `mailto:${EMAIL}?subject=SoulFlame%20AR`;
    });

    scene.addEventListener("loaded", () => {
      arSystem = scene.systems["mindar-image-system"];
      bottomStatus.textContent = "AR READY";
    });

    startBtn.addEventListener("click", async () => {
      if (started) return;

      try {
        started = true;
        startBtn.textContent = "STARTING...";

        if (!arSystem) {
          await new Promise((resolve) => {
            scene.addEventListener("loaded", resolve, { once: true });
          });
          arSystem = scene.systems["mindar-image-system"];
        }

        await arSystem.start();

        startScreen.classList.add("hidden");
        topHud.textContent = "SCAN SOULFLAME CARD";
        bottomStatus.textContent = "SCANNING";
      } catch (error) {
        started = false;
        startBtn.textContent = "START AR";
        bottomStatus.textContent = "CAMERA ERROR";
        alert("Камерата не тръгна. Отвори през HTTPS/Vercel и разреши достъп до камерата.");
        console.error(error);
      }
    });

    target.addEventListener("targetFound", () => {
      visible = true;
      topHud.textContent = "SOULFLAME LOCKED";
      bottomStatus.textContent = "TARGET FOUND";
      actionDock.classList.add("active");
    });

    target.addEventListener("targetLost", () => {
      visible = false;
      topHud.textContent = "SCAN SOULFLAME CARD";
      bottomStatus.textContent = "TARGET LOST";
      actionDock.classList.remove("active");
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden && arSystem && started) {
        try {
          await arSystem.stop();
          started = false;
          visible = false;
          actionDock.classList.remove("active");
          startScreen.classList.remove("hidden");
          startBtn.textContent = "START AR";
          bottomStatus.textContent = "PAUSED";
        } catch (error) {
          console.warn(error);
        }
      }
    });
  </script>
</body>
</html>
