<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030303" />
  <title>Pizza Hit Sliven · SoulFlame AR</title>

  <style>
    :root {
      --bg: #030303;
      --text: #ffffff;
      --gold: #ffb347;
      --gold2: #ffd37a;
      --green: #48ff9b;
      --blue: #1d7cff;
      --purple: #8b35ff;
      --line: rgba(255,255,255,.18);
      --radius-xl: 34px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,179,71,.20), transparent 32%),
        radial-gradient(circle at 18% 82%, rgba(29,124,255,.16), transparent 28%),
        radial-gradient(circle at 86% 80%, rgba(139,53,255,.15), transparent 30%),
        linear-gradient(135deg, #030303, #080808 52%, #130d02);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: min(720px, 120vw);
      height: min(720px, 120vw);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.13);
      box-shadow:
        0 0 120px rgba(255,179,71,.13),
        inset 0 0 90px rgba(255,255,255,.055);
      animation: portalSpin 24s linear infinite;
    }

    body::after {
      inset: -25%;
      opacity: .11;
      background-image:
        linear-gradient(rgba(255,255,255,.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
      animation: gridMove 18s linear infinite;
    }

    @keyframes portalSpin {
      from { transform: rotate(0deg) scale(.94); }
      to { transform: rotate(360deg) scale(1.03); }
    }

    @keyframes gridMove {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(44px,44px,0); }
    }

    .app {
      position: relative;
      z-index: 2;
      width: min(530px, 94vw);
      padding: 34px 24px 24px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.025)),
        rgba(0,0,0,.78);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
      text-align: center;
      box-shadow:
        0 0 90px rgba(255,255,255,.18),
        0 0 80px rgba(255,179,71,.13),
        inset 0 0 30px rgba(255,255,255,.055);
      overflow: hidden;
    }

    .logo-mark {
      width: 76px;
      height: 76px;
      margin: 0 auto;
      position: relative;
      filter: drop-shadow(0 0 18px rgba(255,255,255,.48));
      animation: floatLogo 2.8s ease-in-out infinite alternate;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(255,255,255,.98);
      box-shadow:
        0 0 13px rgba(255,255,255,.74),
        inset 0 0 12px rgba(255,255,255,.14);
    }

    .logo-mark::before {
      inset: 9px;
      transform: rotate(30deg) skew(-8deg);
    }

    .logo-mark::after {
      inset: 20px 5px 5px 34px;
      transform: rotate(-28deg) skew(10deg);
    }

    @keyframes floatLogo {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-8px) rotate(2deg); }
    }

    h1 {
      margin: 20px 0 8px;
      letter-spacing: .18em;
      font-size: clamp(24px, 6vw, 36px);
      line-height: 1;
      text-shadow: 0 0 28px rgba(255,255,255,.40);
    }

    .subtitle {
      margin-bottom: 18px;
      font-size: 11px;
      letter-spacing: .22em;
      color: rgba(255,179,71,.82);
      text-transform: uppercase;
      font-weight: 950;
    }

    p {
      margin: 0 auto 22px;
      max-width: 410px;
      color: rgba(255,255,255,.82);
      line-height: 1.52;
      font-size: 15px;
    }

    .actions {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: var(--radius-pill);
      padding: 15px 20px;
      min-width: min(310px, 100%);
      width: min(340px, 100%);
      font-size: 12px;
      font-weight: 950;
      letter-spacing: .12em;
      transition: transform .18s ease, opacity .18s ease;
      box-shadow:
        0 0 28px rgba(255,255,255,.16),
        inset 0 -12px 22px rgba(0,0,0,.11);
    }

    button:active {
      transform: scale(.95);
    }

    .btn-white {
      background: rgba(255,255,255,.96);
      color: #000;
    }

    .btn-gold {
      background: linear-gradient(135deg, #fff, var(--gold) 46%, var(--gold2));
      color: #000;
      box-shadow:
        0 0 30px rgba(255,179,71,.42),
        inset 0 -12px 22px rgba(0,0,0,.12);
    }

    .btn-green {
      background: linear-gradient(135deg, var(--green), var(--gold));
      color: #000;
      box-shadow:
        0 0 28px rgba(72,255,155,.30),
        0 0 34px rgba(255,179,71,.25);
    }

    .btn-dark {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.055);
      color: rgba(255,255,255,.84);
      backdrop-filter: blur(10px);
    }

    .hint {
      display: block;
      margin-top: 15px;
      color: rgba(255,255,255,.50);
      font-size: 12px;
      line-height: 1.35;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 20px auto 0;
      max-width: 390px;
    }

    .mini-grid span {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 10px 7px;
      background: rgba(255,255,255,.055);
      color: rgba(255,255,255,.72);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .12em;
    }

    .status {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 3;
      max-width: calc(100vw - 24px);
      padding: 9px 13px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(0,0,0,.58);
      color: rgba(255,255,255,.72);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .12em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(12px);
    }

    @media (max-width: 560px) {
      .app {
        padding: 30px 19px 23px;
      }

      .mini-grid {
        grid-template-columns: 1fr 1fr;
      }

      button {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="logo-mark"></div>

    <h1>PIZZA HIT AR</h1>
    <div class="subtitle">SLIVEN · SOULFLAME EXPERIENCE</div>

    <p>
      Избери режим. Digital Card отваря камерата, сканира визитката
      и залепя SoulFlame менюто върху картата.
    </p>

    <div class="actions">
      <button id="digitalCardBtn" class="btn-white">DIGITAL CARD</button>
      <button id="arMiniBtn" class="btn-gold">ARmini</button>
      <button id="arBtn" class="btn-green">AR</button>
      <button id="siteBtn" class="btn-dark">SOULFLAME SAIT</button>
    </div>

    <span class="hint">
      DIGITAL CARD → ./digital_card.html<br>
      ARmini → ./ARmini.html<br>
      AR → ./table-ar.html
    </span>

    <div class="mini-grid">
      <span>CARD</span>
      <span>ARmini</span>
      <span>AR</span>
      <span>SAIT</span>
    </div>
  </main>

  <div class="status">POWERED BY SOULFLAME AR</div>

  <script>
    const LINKS = {
      digitalCard: "./digital_card.html",
      arMini: "./ARmini.html",
      tableAR: "./table-ar.html",
      soulflame: "https://soulflame-ar-card.vercel.app"
    };

    const digitalCardBtn = document.getElementById("digitalCardBtn");
    const arMiniBtn = document.getElementById("arMiniBtn");
    const arBtn = document.getElementById("arBtn");
    const siteBtn = document.getElementById("siteBtn");

    function haptic(ms = 30) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function goTo(url) {
      haptic(35);
      window.location.href = url;
    }

    function openExternal(url) {
      haptic(35);
      window.open(url, "_blank");
    }

    digitalCardBtn.addEventListener("click", () => {
      goTo(LINKS.digitalCard);
    });

    arMiniBtn.addEventListener("click", () => {
      goTo(LINKS.arMini);
    });

    arBtn.addEventListener("click", () => {
      goTo(LINKS.tableAR);
    });

    siteBtn.addEventListener("click", () => {
      openExternal(LINKS.soulflame);
    });
  </script>
</body>
</html>
