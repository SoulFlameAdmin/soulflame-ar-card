<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#030303" />
  <title>Pizza Hit Digital Card · SoulFlame AR</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --bg: #030303;
      --text: #ffffff;
      --gold: #ffb347;
      --gold2: #ffd37a;
      --green: #48ff9b;
      --blue: #1d7cff;
      --purple: #8b35ff;
      --red: #ff3d3d;
      --line: rgba(255,255,255,.18);
      --radius-xl: 34px;
      --radius-pill: 999px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      touch-action: manipulation;
    }

    .hidden {
      display: none !important;
    }

    #menuCaptureFrame {
      position: fixed;
      left: -12000px;
      top: -12000px;
      width: 1160px;
      height: 900px;
      border: 0;
      opacity: .01;
      pointer-events: none;
      z-index: -1;
      background: transparent;
    }

    #fxCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      opacity: .34;
      mix-blend-mode: screen;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -28%;
      pointer-events: none;
      z-index: 1;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 22%, rgba(255,255,255,.13), transparent 24%),
        radial-gradient(circle at 82% 72%, rgba(255,179,71,.18), transparent 26%),
        radial-gradient(circle at 50% 48%, rgba(255,255,255,.045), transparent 33%),
        linear-gradient(120deg, transparent 30%, rgba(255,255,255,.055), transparent 68%);
      filter: blur(18px);
      animation: universeMove 13s ease-in-out infinite alternate;
    }

    body::after {
      opacity: .10;
      background-image:
        linear-gradient(rgba(255,255,255,.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.12) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 70%);
      animation: gridDrift 18s linear infinite;
    }

    @keyframes universeMove {
      from { transform: translate3d(-2%, -1%, 0) scale(1); }
      to { transform: translate3d(2%, 1.5%, 0) scale(1.08); }
    }

    @keyframes gridDrift {
      from { transform: translate3d(0,0,0); }
      to { transform: translate3d(44px,44px,0); }
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,.14), rgba(0,0,0,.96) 62%),
        radial-gradient(circle at 50% 20%, rgba(255,179,71,.18), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,.08), transparent 42%, rgba(255,179,71,.08));
      overflow: hidden;
    }

    #startScreen::before {
      content: "";
      position: absolute;
      width: min(620px, 116vw);
      height: min(620px, 116vw);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow:
        0 0 120px rgba(255,255,255,.12),
        inset 0 0 90px rgba(255,255,255,.055);
      animation: portalRotate 20s linear infinite;
    }

    @keyframes portalRotate {
      from { transform: rotate(0deg) scale(.92); }
      to { transform: rotate(360deg) scale(1.02); }
    }

    .start-card {
      position: relative;
      z-index: 3;
      width: min(520px, 93vw);
      padding: 34px 24px 24px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255,255,255,.22);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.025)),
        rgba(0,0,0,.76);
      backdrop-filter: blur(26px) saturate(150%);
      -webkit-backdrop-filter: blur(26px) saturate(150%);
      text-align: center;
      box-shadow:
        0 0 90px rgba(255,255,255,.18),
        0 0 80px rgba(255,179,71,.10),
        inset 0 0 30px rgba(255,255,255,.055);
      overflow: hidden;
    }

    .logo-mark {
      width: 74px;
      height: 74px;
      margin: 0 auto;
      position: relative;
      filter: drop-shadow(0 0 18px rgba(255,255,255,.48));
      animation: logoFloat 2.9s ease-in-out infinite alternate;
    }

    .logo-mark::before,
    .logo-mark::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(255,255,255,.98);
      box-shadow:
        0 0 13px rgba(255,255,255,.74),
        inset 0 0 12px rgba(255,255,255,.14);
    }

    .logo-mark::before {
      inset: 9px;
      transform: rotate(30deg) skew(-8deg);
    }

    .logo-mark::after {
      inset: 20px 5px 5px 34px;
      transform: rotate(-28deg) skew(10deg);
    }

    @keyframes logoFloat {
      from { transform: translateY(0) rotate(-2deg); }
      to { transform: translateY(-8px) rotate(2deg); }
    }

    .start-card h1 {
      margin: 20px 0 8px;
      letter-spacing: .18em;
      font-size: clamp(22px, 6vw, 33px);
      line-height: 1;
      text-shadow: 0 0 28px rgba(255,255,255,.40);
    }

    .subtitle {
      margin-bottom: 18px;
      font-size: 11px;
      letter-spacing: .22em;
      color: rgba(255,179,71,.78);
      text-transform: uppercase;
      font-weight: 950;
    }

    .start-card p {
      margin: 0 auto 22px;
      max-width: 410px;
      color: rgba(255,255,255,.82);
      line-height: 1.52;
      font-size: 15px;
    }

    .start-actions {
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    button,
    a {
      cursor: pointer;
      font-weight: 950;
      letter-spacing: .12em;
      transition: transform .18s ease, opacity .18s ease;
      text-decoration: none;
      text-align: center;
    }

    button:active,
    a:active {
      transform: scale(.95);
    }

    button:disabled {
      opacity: .58;
      cursor: wait;
    }

    .main-btn {
      border: 0;
      border-radius: var(--radius-pill);
      padding: 15px 20px;
      min-width: min(300px, 100%);
      width: min(330px, 100%);
      font-size: 12px;
      box-shadow:
        0 0 28px rgba(255,255,255,.16),
        inset 0 -12px 22px rgba(0,0,0,.11);
    }

    .btn-white {
      background: rgba(255,255,255,.96);
      color: #000;
    }

    .btn-dark {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.055);
      color: rgba(255,255,255,.84);
      backdrop-filter: blur(10px);
    }

    .hint {
      display: block;
      margin-top: 15px;
      color: rgba(255,255,255,.50);
      font-size: 12px;
      line-height: 1.35;
    }

    #topHud {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 9998;
      padding: 10px 15px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(15px) saturate(150%);
      -webkit-backdrop-filter: blur(15px) saturate(150%);
      color: rgba(255,255,255,.92);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .15em;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 0 30px rgba(255,255,255,.10);
      max-width: calc(100vw - 20px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #scanFrame {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 9997;
      width: min(68vw, 340px);
      aspect-ratio: .56;
      transform: translate(-50%, -50%);
      border-radius: 30px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .25s ease, transform .25s ease;
    }

    #scanFrame.active {
      opacity: .72;
    }

    #scanFrame.locked {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.92);
    }

    #scanFrame::before,
    #scanFrame::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    #scanFrame::before {
      border: 1px solid rgba(255,255,255,.26);
      box-shadow:
        0 0 54px rgba(255,179,71,.16),
        inset 0 0 42px rgba(255,255,255,.06);
    }

    #scanFrame::after {
      background:
        linear-gradient(#fff,#fff) left top / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) left top / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) right top / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) right top / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) left bottom / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) left bottom / 2px 46px no-repeat,
        linear-gradient(#fff,#fff) right bottom / 46px 2px no-repeat,
        linear-gradient(#fff,#fff) right bottom / 2px 46px no-repeat;
      filter: drop-shadow(0 0 11px rgba(255,179,71,.78));
      animation: framePulse 1.35s ease-in-out infinite alternate;
    }

    #scanLine {
      position: absolute;
      left: 8%;
      right: 8%;
      top: 10%;
      height: 2px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, var(--gold), #fff, var(--gold), transparent);
      box-shadow: 0 0 18px rgba(255,179,71,.85);
      animation: scanLineMove 2.1s ease-in-out infinite alternate;
    }

    @keyframes framePulse {
      from { opacity: .45; transform: scale(.99); }
      to { opacity: 1; transform: scale(1.01); }
    }

    @keyframes scanLineMove {
      from { transform: translateY(0); opacity: .25; }
      to { transform: translateY(342px); opacity: .9; }
    }

    #bottomStatus {
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 9998;
      padding: 9px 12px;
      border-radius: var(--radius-pill);
      background: rgba(0,0,0,.62);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.82);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .12em;
      backdrop-filter: blur(11px);
      pointer-events: none;
      max-width: 55vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #debugBox {
      position: fixed;
      left: 12px;
      top: 54px;
      z-index: 10002;
      width: min(520px, calc(100vw - 24px));
      max-height: 62vh;
      overflow: auto;
      padding: 10px 12px;
      border: 1px solid rgba(255,80,80,.35);
      border-radius: 16px;
      background: rgba(0,0,0,.82);
      color: rgba(255,255,255,.86);
      font-size: 11px;
      line-height: 1.38;
      display: none;
      white-space: pre-wrap;
      pointer-events: none;
    }

    #debugBox.active {
      display: block;
    }

    #actionDock {
      position: fixed;
      left: 50%;
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 18px));
      transform: translateX(-50%) translateY(18px) scale(.96);
      z-index: 9999;
      display: flex;
      gap: 7px;
      padding: 8px;
      border-radius: 28px;
      background: rgba(0,0,0,.58);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(17px) saturate(155%);
      -webkit-backdrop-filter: blur(17px) saturate(155%);
      opacity: 0;
      pointer-events: none;
      transition: opacity .24s ease, transform .24s ease;
      box-shadow: 0 0 44px rgba(255,255,255,.13);
      max-width: calc(100vw - 16px);
      overflow-x: auto;
    }

    #actionDock.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    #actionDock button {
      border: 0;
      border-radius: var(--radius-pill);
      padding: 12px 11px;
      font-size: 8.5px;
      background: rgba(255,255,255,.96);
      color: #000;
      box-shadow: 0 0 18px rgba(255,255,255,.20);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    #actionDock button.dark {
      background: rgba(0,0,0,.82);
      color: #fff;
      border: 1px solid rgba(255,255,255,.38);
    }

    #actionDock button.gold {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 30px rgba(255,179,71,.58);
    }

    #actionDock button.table {
      background: linear-gradient(135deg, #48ff9b, var(--gold));
      color: #000;
    }

    .a-loader-title {
      display: none !important;
    }

    @media (max-width: 560px) {
      .start-card {
        padding: 30px 19px 23px;
      }

      #topHud {
        font-size: 10px;
      }

      #actionDock {
        width: calc(100vw - 18px);
        justify-content: flex-start;
        border-radius: 26px;
        gap: 5px;
      }

      #actionDock button {
        padding: 13px 8px;
        font-size: 7px;
      }

      #bottomStatus {
        font-size: 9px;
      }

      #scanFrame {
        width: min(72vw, 315px);
      }
    }
  </style>
</head>

<body>
  <iframe id="menuCaptureFrame" src="./menu_za_vizitka/sf-menu.html"></iframe>

  <canvas id="fxCanvas"></canvas>
  <div id="debugBox"></div>

  <section id="startScreen">
    <div class="start-card">
      <div class="logo-mark"></div>
      <h1>DIGITAL CARD</h1>
      <div class="subtitle">PIZZA HIT · SOULFLAME AR</div>

      <p>
        Камерата се стартира автоматично. Покажи визитката към телефона.
      </p>

      <div class="start-actions">
        <button id="startBtn" class="main-btn btn-white">STARTING CAMERA...</button>
        <button id="backBtn" class="main-btn btn-dark">BACK TO INDEX</button>
      </div>

      <span class="hint">
        Ако камерата не тръгне автоматично, докосни STARTING CAMERA.<br>
        Target: ./targets/soulflame-black.mind<br>
        Texture: ./menu_za_vizitka/sf-menu.html
      </span>
    </div>
  </section>

  <div id="topHud">STARTING CAMERA</div>

  <div id="scanFrame">
    <div id="scanLine"></div>
  </div>

  <div id="bottomStatus">SHOW CARD</div>

  <div id="actionDock">
    <button id="resetScanBtn" class="gold">SCAN</button>
    <button id="reloadMenuBtn">RELOAD</button>
    <button id="openARBtn" class="table">AR</button>
    <button id="openSiteBtn" class="dark">SAIT</button>
    <button id="debugBtn" class="dark">DEBUG</button>
  </div>

  <a-scene
    id="scene"
    mindar-image="
      imageTargetSrc: ./targets/soulflame-black.mind;
      autoStart: false;
      uiScanning: no;
      uiLoading: no;
      warmupTolerance: 5;
      missTolerance: 80;
      filterMinCF: 0.00004;
      filterBeta: 0.0006;
    "
    color-space="sRGB"
    renderer="
      colorManagement: true;
      physicallyCorrectLights: false;
      antialias: true;
      alpha: true;
      precision: high;
      logarithmicDepthBuffer: true;
      powerPreference: high-performance;
    "
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-camera
      position="0 0 0"
      look-controls="enabled: false"
      camera="near: 0.001; far: 100000"
    ></a-camera>

    <a-light type="ambient" intensity="0.85" color="#ffffff"></a-light>
    <a-light type="directional" intensity="1.0" color="#ffffff" position="0 2 1"></a-light>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-light type="ambient" intensity="1.15" color="#ffffff"></a-light>
      <a-light type="directional" intensity="1.35" color="#ffffff" position="0 1.3 1"></a-light>

      <a-entity
        id="menuRig"
        position="0 0 0.08"
        rotation="0 0 0"
        scale="1 1 1"
        animation__float="property: position; from: 0 -0.006 0.08; to: 0 0.006 0.08; dur: 2500; dir: alternate; loop: true; easing: easeInOutSine"
      >
        <a-plane
          id="menuPlane"
          position="0 0 0"
          rotation="0 0 0"
          width="1.82"
          height="1.41"
          material="shader: flat; transparent: true; side: double; depthWrite: false"
        ></a-plane>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const CONFIG = {
      menuTextureUrl: "./menu_za_vizitka/sf-menu.html",
      targetFile: "./targets/soulflame-black.mind",
      indexUrl: "./index.html",
      tableARUrl: "./table-ar.html",
      siteUrl: "https://soulflame-ar-card.vercel.app",
      scanTimeoutMs: 14000,
      autoFocusDelayMs: 650,
      autoFocusRetryMs: 1200,
      autoStartDelayMs: 450
    };

    const menuCaptureFrame = document.getElementById("menuCaptureFrame");
    const scene = document.getElementById("scene");
    const target = document.getElementById("target");
    const menuPlane = document.getElementById("menuPlane");

    const startScreen = document.getElementById("startScreen");
    const startBtn = document.getElementById("startBtn");
    const backBtn = document.getElementById("backBtn");

    const topHud = document.getElementById("topHud");
    const bottomStatus = document.getElementById("bottomStatus");
    const scanFrame = document.getElementById("scanFrame");
    const actionDock = document.getElementById("actionDock");
    const debugBox = document.getElementById("debugBox");

    const resetScanBtn = document.getElementById("resetScanBtn");
    const reloadMenuBtn = document.getElementById("reloadMenuBtn");
    const openARBtn = document.getElementById("openARBtn");
    const openSiteBtn = document.getElementById("openSiteBtn");
    const debugBtn = document.getElementById("debugBtn");

    const fxCanvas = document.getElementById("fxCanvas");
    const fxCtx = fxCanvas.getContext("2d");

    let arSystem = null;
    let started = false;
    let visible = false;
    let scanTimer = null;

    let cameraTrack = null;
    let autoFocusReady = false;
    let autoFocusMode = "unknown";

    let menuTextureReady = false;
    let menuTextureInProgress = false;
    let arMenuTexture = null;
    let debugInfo = "DIGITAL CARD DEBUG\n";

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function haptic(ms = 35) {
      if (navigator.vibrate) navigator.vibrate(ms);
    }

    function setStatus(top, bottom) {
      topHud.textContent = top;
      bottomStatus.textContent = bottom;
    }

    function showDebug(message) {
      debugInfo += "\n\n" + message;
      debugBox.classList.add("active");
      debugBox.textContent = debugInfo;
      console.warn(message);
    }

    function hideDebug() {
      debugBox.classList.remove("active");
    }

    function waitForIframeLoad(iframe) {
      return new Promise(resolve => {
        try {
          if (iframe.contentDocument && iframe.contentDocument.readyState === "complete") {
            resolve();
            return;
          }
        } catch (error) {
          resolve();
          return;
        }

        iframe.addEventListener("load", () => resolve(), { once: true });
      });
    }

    function waitForSceneLoaded() {
      return new Promise(resolve => {
        if (scene.hasLoaded) {
          resolve();
          return;
        }

        scene.addEventListener("loaded", () => resolve(), { once: true });
      });
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawMenuFallbackCanvas(reason = "fallback") {
      const canvas = document.createElement("canvas");
      canvas.width = 1160;
      canvas.height = 900;

      const ctx = canvas.getContext("2d");
      const g = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);

      g.addColorStop(0, "#ffffff");
      g.addColorStop(.45, "#ffb347");
      g.addColorStop(1, "#8b35ff");

      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = g;
      roundRect(ctx, 55, 55, 1050, 790, 58);
      ctx.fill();

      ctx.fillStyle = "rgba(0,0,0,.32)";
      roundRect(ctx, 75, 75, 1010, 750, 46);
      ctx.fill();

      ctx.textAlign = "center";
      ctx.fillStyle = "#fff";
      ctx.font = "900 78px Arial";
      ctx.fillText("SoulFlame AR", 580, 230);

      ctx.font = "900 54px Arial";
      ctx.fillText("Pizza Hit Sliven", 580, 330);

      ctx.font = "700 27px Arial";
      ctx.fillText(String(reason).slice(0, 70), 580, 420);

      ctx.fillStyle = "#ffb347";
      ctx.font = "900 38px Arial";
      ctx.fillText("Digital Card Fallback", 580, 585);

      ctx.fillStyle = "rgba(255,255,255,.82)";
      ctx.font = "700 24px Arial";
      ctx.fillText("Check ./menu_za_vizitka/sf-menu.html", 580, 650);

      return canvas;
    }

    async function captureExternalMenuToCanvas(forceReload = false) {
      try {
        if (forceReload) {
          menuTextureReady = false;
          menuCaptureFrame.src = CONFIG.menuTextureUrl + "?v=" + Date.now();
        }

        await waitForIframeLoad(menuCaptureFrame);
        await sleep(850);

        const doc = menuCaptureFrame.contentDocument;

        if (!doc) {
          throw new Error("Cannot access sf-menu.html. Use localhost or HTTPS, not file://");
        }

        if (doc.fonts && doc.fonts.ready) {
          await doc.fonts.ready;
        }

        const targetMenu = doc.querySelector(".floating-menu") || doc.querySelector("#arCard") || doc.body;

        if (!targetMenu) {
          throw new Error("No .floating-menu / #arCard found in sf-menu.html");
        }

        const images = Array.from(doc.images || []);

        await Promise.all(images.map(img => {
          if (img.complete) return Promise.resolve();

          return new Promise(resolve => {
            img.onload = resolve;
            img.onerror = resolve;
          });
        }));

        const canvas = await html2canvas(targetMenu, {
          backgroundColor: null,
          useCORS: true,
          allowTaint: true,
          scale: 2,
          width: 1160,
          height: 900,
          windowWidth: 1160,
          windowHeight: 900,
          logging: false
        });

        menuTextureReady = true;
        return canvas;

      } catch (error) {
        menuTextureReady = false;
        showDebug("MENU TEXTURE ERROR:\n" + (error.message || error));
        return drawMenuFallbackCanvas(error.message || String(error));
      }
    }

    async function applyExternalMenuTexture(forceReload = false) {
      if (!window.THREE) return;

      if (menuTextureInProgress) return;
      menuTextureInProgress = true;

      try {
        const canvas = await captureExternalMenuToCanvas(forceReload);
        const mesh = menuPlane.getObject3D("mesh");

        if (!mesh) {
          menuPlane.addEventListener("object3dset", () => {
            applyExternalMenuTexture(false);
          }, { once: true });
          return;
        }

        if (arMenuTexture) {
          arMenuTexture.dispose();
          arMenuTexture = null;
        }

        arMenuTexture = new THREE.CanvasTexture(canvas);

        if (THREE.SRGBColorSpace) {
          arMenuTexture.colorSpace = THREE.SRGBColorSpace;
        }

        arMenuTexture.anisotropy = 8;
        arMenuTexture.needsUpdate = true;

        mesh.material = new THREE.MeshBasicMaterial({
          map: arMenuTexture,
          transparent: true,
          side: THREE.DoubleSide,
          depthWrite: false
        });

        mesh.material.needsUpdate = true;

        setStatus(
          menuTextureReady ? "DIGITAL CARD READY" : "FALLBACK MENU ACTIVE",
          menuTextureReady ? "STARTING CAMERA" : "CHECK sf-menu.html"
        );

      } finally {
        menuTextureInProgress = false;
      }
    }

    async function getCameraTrackFromMindAR() {
      const maxTries = 20;

      for (let i = 0; i < maxTries; i++) {
        const videos = Array.from(document.querySelectorAll("video"));

        for (const video of videos) {
          const stream = video.srcObject;

          if (stream && typeof stream.getVideoTracks === "function") {
            const track = stream.getVideoTracks()[0];

            if (track && track.readyState === "live") {
              cameraTrack = track;
              return track;
            }
          }
        }

        await sleep(150);
      }

      return null;
    }

    async function enableCameraAutoFocus(reason = "manual") {
      try {
        const track = cameraTrack || await getCameraTrackFromMindAR();

        if (!track) {
          autoFocusMode = "no-video-track";
          return false;
        }

        if (!track.getCapabilities || !track.applyConstraints) {
          autoFocusMode = "not-supported-api";
          return false;
        }

        const capabilities = track.getCapabilities();
        const advanced = [];

        if (capabilities.focusMode && capabilities.focusMode.includes("continuous")) {
          advanced.push({ focusMode: "continuous" });
          autoFocusMode = "continuous";
        } else if (capabilities.focusMode && capabilities.focusMode.includes("single-shot")) {
          advanced.push({ focusMode: "single-shot" });
          autoFocusMode = "single-shot";
        } else {
          autoFocusMode = "focus-mode-not-exposed";
          return false;
        }

        await track.applyConstraints({ advanced });
        autoFocusReady = true;

        debugInfo += "\nAUTOFOCUS: " + reason + " / " + JSON.stringify(advanced);
        return true;

      } catch (error) {
        autoFocusReady = false;
        autoFocusMode = "error";
        debugInfo += "\nAUTOFOCUS ERROR: " + (error.message || error);
        return false;
      }
    }

    async function pulseSingleShotFocus() {
      try {
        const track = cameraTrack || await getCameraTrackFromMindAR();

        if (!track || !track.getCapabilities || !track.applyConstraints) return false;

        const capabilities = track.getCapabilities();

        if (capabilities.focusMode && capabilities.focusMode.includes("single-shot")) {
          await track.applyConstraints({
            advanced: [{ focusMode: "single-shot" }]
          });

          autoFocusMode = "single-shot-pulse";
          return true;
        }

        if (capabilities.focusMode && capabilities.focusMode.includes("continuous")) {
          await track.applyConstraints({
            advanced: [{ focusMode: "continuous" }]
          });

          autoFocusMode = "continuous-refresh";
          return true;
        }

        return false;
      } catch (error) {
        debugInfo += "\nFOCUS PULSE ERROR: " + (error.message || error);
        return false;
      }
    }

    async function startDigitalCardAR() {
      if (started) return;

      if (location.protocol === "file:") {
        showDebug("Не стартирай с двоен клик върху html. Камерата и iframe texture искат HTTPS или localhost.");
        alert("Отвори през Vercel/HTTPS или localhost. Не през file://");
        return;
      }

      try {
        started = true;
        startBtn.textContent = "CAMERA STARTING...";
        startBtn.disabled = true;

        await waitForSceneLoaded();

        if (!arSystem) {
          arSystem = scene.systems["mindar-image-system"];
        }

        if (!arSystem) {
          throw new Error("MindAR system not found");
        }

        if (!menuTextureReady) {
          await applyExternalMenuTexture(false);
        }

        await arSystem.start();

        await sleep(CONFIG.autoFocusDelayMs);
        await enableCameraAutoFocus("after-digital-card-start");

        setTimeout(() => {
          enableCameraAutoFocus("retry-after-start");
        }, CONFIG.autoFocusRetryMs);

        startScreen.classList.add("hidden");
        scanFrame.classList.add("active");
        scanFrame.classList.remove("locked");
        actionDock.classList.remove("active");

        setStatus(autoFocusReady ? "AUTOFOCUS ON" : "ПОКАЖЕТЕ ВИЗИТКАТА", "SCANNING DIGITAL CARD");

        clearTimeout(scanTimer);
        scanTimer = setTimeout(() => {
          if (started && !visible) {
            setStatus("TARGET NOT FOUND", "CHECK .MIND + LIGHT");
            showDebug(
              "Не намира визитката.\n" +
              "1. Провери дали ./targets/soulflame-black.mind съществува.\n" +
              "2. Сканирай същата визитка, от която е направен target-ът.\n" +
              "3. Дръж телефона по-далече и приближавай бавно.\n" +
              "4. Не отваряй през Viber/Messenger/Facebook browser.\n" +
              "5. AUTOFOCUS MODE: " + autoFocusMode
            );
          }
        }, CONFIG.scanTimeoutMs);

        haptic(45);

      } catch (error) {
        started = false;
        startBtn.disabled = false;
        startBtn.textContent = "TAP TO START CAMERA";
        setStatus("TAP TO START CAMERA", "BROWSER BLOCKED AUTOSTART");
        showDebug(error.message || String(error));
      }
    }

    scene.addEventListener("loaded", async () => {
      arSystem = scene.systems["mindar-image-system"];

      if (scene.renderer && window.THREE) {
        if (THREE.SRGBColorSpace) {
          scene.renderer.outputColorSpace = THREE.SRGBColorSpace;
        }

        scene.renderer.toneMappingExposure = 1.0;
        scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.35));
      }

      await applyExternalMenuTexture(false);
      setStatus("DIGITAL CARD READY", "AUTO STARTING");
    });

    target.addEventListener("targetFound", async () => {
      visible = true;

      clearTimeout(scanTimer);
      hideDebug();

      await pulseSingleShotFocus();

      if (!menuTextureReady) {
        await applyExternalMenuTexture(false);
      }

      setStatus("MENU LOCKED", "SF-MENU ON CARD");
      actionDock.classList.add("active");
      scanFrame.classList.add("locked");

      haptic(60);
    });

    target.addEventListener("targetLost", () => {
      visible = false;

      setStatus("TARGET LOST", "SHOW CARD AGAIN");
      actionDock.classList.remove("active");
      scanFrame.classList.remove("locked");
      scanFrame.classList.add("active");
    });

    startBtn.addEventListener("click", startDigitalCardAR);

    backBtn.addEventListener("click", () => {
      haptic(25);
      window.location.href = CONFIG.indexUrl;
    });

    resetScanBtn.addEventListener("click", () => {
      scanFrame.classList.add("active");
      scanFrame.classList.remove("locked");
      actionDock.classList.remove("active");
      setStatus("SCAN RESET", "SHOW CARD AGAIN");
      haptic(25);
    });

    reloadMenuBtn.addEventListener("click", async () => {
      setStatus("RELOADING MENU", "WAIT");
      await applyExternalMenuTexture(true);
      setStatus("MENU RELOADED", "SHOW CARD");
      haptic(35);
    });

    openARBtn.addEventListener("click", () => {
      haptic(35);
      window.location.href = CONFIG.tableARUrl;
    });

    openSiteBtn.addEventListener("click", () => {
      haptic(25);
      window.open(CONFIG.siteUrl, "_blank");
    });

    debugBtn.addEventListener("click", () => {
      showDebug(
        "DIGITAL CARD LIVE DEBUG\n" +
        "URL: " + location.href + "\n" +
        "HTTPS: " + window.isSecureContext + "\n" +
        "TARGET: " + CONFIG.targetFile + "\n" +
        "MENU: " + CONFIG.menuTextureUrl + "\n" +
        "STARTED: " + started + "\n" +
        "VISIBLE: " + visible + "\n" +
        "TEXTURE READY: " + menuTextureReady + "\n" +
        "AUTOFOCUS: " + autoFocusMode
      );

      haptic(20);
    });

    document.addEventListener("click", async event => {
      const clickable = event.target.closest("button, a, model-viewer");
      if (clickable) return;

      if (started && !visible) {
        const ok = await pulseSingleShotFocus();
        if (ok) setStatus("FOCUS PULSE", "SCAN CARD");
      }
    });

    document.addEventListener("visibilitychange", async () => {
      if (document.hidden && arSystem && started) {
        try {
          await arSystem.stop();
        } catch (error) {
          console.warn(error);
        }

        started = false;
        visible = false;
        cameraTrack = null;
        autoFocusReady = false;
        autoFocusMode = "paused";

        clearTimeout(scanTimer);

        actionDock.classList.remove("active");
        scanFrame.classList.remove("active", "locked");
        startScreen.classList.remove("hidden");
        startBtn.disabled = false;
        startBtn.textContent = "TAP TO START CAMERA";

        setStatus("AR PAUSED", "TAP TO START");
      }
    });

    window.addEventListener("load", () => {
      setStatus("STARTING CAMERA", "SHOW CARD");

      setTimeout(() => {
        startDigitalCardAR();
      }, CONFIG.autoStartDelayMs);
    });

    window.addEventListener("error", event => {
      showDebug("JS ERROR: " + event.message);
    });

    window.addEventListener("unhandledrejection", event => {
      showDebug("PROMISE ERROR: " + (event.reason?.message || event.reason));
    });

    const particles = [];
    const PARTICLE_COUNT = 38;

    function resizeFx() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.4);

      fxCanvas.width = Math.floor(window.innerWidth * dpr);
      fxCanvas.height = Math.floor(window.innerHeight * dpr);
      fxCanvas.style.width = window.innerWidth + "px";
      fxCanvas.style.height = window.innerHeight + "px";

      fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function createParticles() {
      particles.length = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: Math.random() * 1.6 + .35,
          vx: (Math.random() - .5) * .18,
          vy: (Math.random() - .5) * .18,
          a: Math.random() * .48 + .12
        });
      }
    }

    function drawParticles() {
      fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;

        if (p.x < 0) p.x = window.innerWidth;
        if (p.x > window.innerWidth) p.x = 0;
        if (p.y < 0) p.y = window.innerHeight;
        if (p.y > window.innerHeight) p.y = 0;

        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fxCtx.fillStyle = `rgba(255,255,255,${p.a})`;
        fxCtx.fill();
      }

      requestAnimationFrame(drawParticles);
    }

    window.addEventListener("resize", () => {
      resizeFx();
      createParticles();

      if (scene.renderer) {
        scene.renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.35));
      }
    });

    resizeFx();
    createParticles();
    drawParticles();
  </script>
</body>
